name: No Fixups

on: pull_request

jobs:
  no-fixups:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: thing
        run: git rev-parse --verify "${GITHUB_REF}^{commit}"      
